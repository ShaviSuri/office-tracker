<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Office Presence Planner</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app">

  <header>
    <h1>Office Presence Planner</h1>
    <div class="selectors">
      <select id="monthSelect"></select>
      <select id="yearSelect"></select>
    </div>
  </header>

  <main>

    <!-- Holidays -->
    <section class="panel">
      <h3>Holidays</h3>
      <div id="holidayList"></div>
    </section>

    <!-- Inputs -->
    <section class="panel">
      <h3>Your Plan</h3>

      <label>Office Days</label>
      <input type="number" id="officeDays" />

      <label>Leaves & Restricted Holidays</label>
      <input type="number" id="leaves" value="0" />

      <button id="calcBtn">Recalculate</button>
    </section>

    <!-- Summary -->
    <section class="panel result">
      <h3>Monthly Summary</h3>
      <div id="result"></div>

      <div class="progress-wrapper">
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <div id="safeLeaves"></div>
    </section>

    <!-- Calendar -->
    <section class="panel calendar">
      <h3>Calendar View</h3>
      <div id="calendar"></div>
    </section>

  </main>

</div>

<script src="app.js"></script>
<script>lucide.createIcons();</script>

</body>
</html>
