<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Office Presence Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <header>
    <h1>Office Presence Planner</h1>
    <input type="month" id="monthPicker" />
  </header>

  <main>
    <section class="panel">
      <h3>Declared Holidays</h3>
      <div id="holidayList"></div>
    </section>

    <section class="panel">
      <h3>Input</h3>

      <label>Office Days</label>
      <input type="number" id="officeDays" />

      <label>Leaves</label>
      <input type="number" id="leaves" />

      <button id="calcBtn">Calculate</button>
    </section>

    <section class="panel result">
      <h3>Result</h3>
      <div id="result"></div>
    </section>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
