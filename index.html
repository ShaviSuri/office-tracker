<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Office Presence Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <header>
    <h1>Office Presence Planner</h1>
    <div class="selectors">
      <select id="monthSelect"></select>
      <select id="yearSelect"></select>
    </div>
  </header>

  <main>

    <!-- Holidays -->
    <section class="panel">
      <h3>
        Holidays
        <span class="info">
          ⓘ
          <span class="tooltip">
            Declared: excluded from working days<br>
            Restricted: optional, can be added as leave
          </span>
        </span>
      </h3>
      <div id="holidayList"></div>
    </section>

    <!-- Plan -->
    <section class="panel">
      <h3>Your Plan</h3>

      <label>
        Office Days
        <span class="info">
          ⓘ
          <span class="tooltip">
            Calculated after considering declared holidays
          </span>
        </span>
      </label>
      <input type="number" id="officeDays" />

      <label>
        Leaves & Restricted Holidays
      </label>
      <input type="number" id="leaves" value="0" />

      <button id="calcBtn">Recalculate</button>
    </section>

    <!-- Summary -->
    <section class="panel result">
      <h3>Monthly Summary</h3>
      <div id="result"></div>
    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
