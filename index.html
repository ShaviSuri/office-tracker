<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Office Presence Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <header>
    <h1>Office Presence Planner</h1>

    <!-- Better than default month picker -->
    <div class="selectors">
      <select id="monthSelect"></select>
      <select id="yearSelect"></select>
    </div>
  </header>

  <main>

    <!-- Holidays -->
    <section class="panel">
      <h3>Declared Holidays</h3>
      <div id="holidayList"></div>
    </section>

    <!-- Input -->
    <section class="panel">
      <h3>Input</h3>

      <label>Office Days</label>
      <input type="number" id="officeDays" placeholder="e.g. 12" />

      <label>Leaves</label>
      <input type="number" id="leaves" placeholder="e.g. 3" />

      <button id="calcBtn">Calculate</button>
    </section>

    <!-- Result -->
    <section class="panel result">
      <h3>Result</h3>
      <div id="result">Select month and calculate</div>
    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
