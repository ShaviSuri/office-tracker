<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Office Presence Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <header>
    <h1>Office Presence Planner</h1>

    <div class="selectors">
      <select id="monthSelect"></select>
      <select id="yearSelect"></select>
    </div>
  </header>

  <main>

    <!-- Holidays -->
    <section class="panel">
      <h3>
        Declared Holidays
        <span class="info" title="These are company declared holidays. They are excluded from working days.">ⓘ</span>
      </h3>
      <div id="holidayList"></div>
    </section>

    <!-- Inputs -->
    <section class="panel">
      <h3>
        Your Plan
        <span class="info" title="Office days are auto-filled based on working days. You can adjust manually.">ⓘ</span>
      </h3>

      <label>
        Office Days
        <span class="info" title="Auto-calculated working days (excluding weekends & holidays). Adjust if needed.">ⓘ</span>
      </label>
      <input type="number" id="officeDays" />

      <label>
        Leaves & Restricted Holidays
        <span class="info" title="Leaves + optional holidays you take. These reduce working days.">ⓘ</span>
      </label>
      <input type="number" id="leaves" value="0" />

      <button id="calcBtn">Calculate</button>
    </section>

    <!-- Result -->
    <section class="panel result">
      <h3>
        Summary
        <span class="info" title="Final calculation based on your inputs and company rules.">ⓘ</span>
      </h3>
      <div id="result">Select month and calculate</div>
    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
