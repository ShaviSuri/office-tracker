<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Office Presence Planner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="header">
<h1>Office Presence Planner</h1>
<input type="month" id="monthPicker">
</div>

<div class="grid">

<div class="left">
<h3>Declared Holidays</h3>
<ul id="holidayList"></ul>
</div>

<div class="center">
<h3>Quick Input</h3>

<label>Office Days</label>
<input type="number" id="officeDays">

<label>Leaves</label>
<input type="number" id="leaves">

<button onclick="calculate()">Calculate</button>
</div>

<div class="right">
<h3>Result</h3>
<div id="result"></div>
</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
